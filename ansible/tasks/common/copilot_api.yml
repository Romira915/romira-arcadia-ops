---
# Install copilot-api globally via npm. Required by ~/.local/bin/claude-copilot,
# which auto-starts copilot-api on demand and routes Claude Code through
# GitHub Copilot Enterprise via claude-code-router.
- name: Install copilot-api globally via npm
  community.general.npm:
    name: copilot-api
    global: true
    state: present
  when: ansible_os_family != 'Windows'
  environment:
    PATH: "/opt/homebrew/bin:/home/linuxbrew/.linuxbrew/bin:{{ ansible_env.PATH | default('') }}"

- name: Install copilot-api globally via npm (Windows)
  ansible.windows.win_shell: npm install -g copilot-api
  args:
    creates: "C:\\Users\\{{ ansible_user }}\\AppData\\Roaming\\npm\\copilot-api.cmd"
  when: ansible_os_family == 'Windows'




