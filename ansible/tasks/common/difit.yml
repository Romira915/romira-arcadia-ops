---
# Install difit globally via npm. Local GitHub-style diff viewer used to
# review AI coding agent (Claude Code) output before committing.
- name: Install difit globally via npm
  community.general.npm:
    name: difit
    global: true
    state: present
  when: ansible_os_family != 'Windows'
  environment:
    PATH: "/opt/homebrew/bin:/home/linuxbrew/.linuxbrew/bin:{{ ansible_env.PATH | default('') }}"

- name: Install difit globally via npm (Windows)
  ansible.windows.win_shell: npm install -g difit
  args:
    creates: "C:\\Users\\{{ ansible_user }}\\AppData\\Roaming\\npm\\difit.cmd"
  when: ansible_os_family == 'Windows'
