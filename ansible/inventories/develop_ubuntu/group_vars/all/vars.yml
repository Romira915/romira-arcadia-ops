is_wsl: true
setup_user: romira
windows_user: romira
apt:
  dependencies:
    - "{{ (ansible_distribution == 'Debian' and ansible_distribution_major_version is version('8', '<')) | ternary('python-apt', 'python3-apt') }}"
    - aptitude
    - gnupg
    - libbz2-dev
    - libfuse2
    - librust-zip+deflate-zlib-dev
    - g++-aarch64-linux-gnu
  repositories:
    - ppa:fish-shell/release-3
    - ppa:ikuya-fruitsbasket/fcitx5
  package:
    - unzip
    - build-essential
    - procps
    - curl
    - file
    - git
    - lldb
    - cmake
    - wakeonlan
    - keychain
    - zsh
    - fish
    - ttf-mscorefonts-installer
    - sshpass
    - dbus-x11
    - language-pack-ja
    - nautilus
    - apache2-utils
    - fcitx5
    - fcitx5-mozc
    - htop
  install_state: present
bitwarden:
  server: https://vaultwarden.romira.dev
  email_address: "{{ vault_bitwarden.vault_email_address }}"
  password: "{{ vault_bitwarden.vault_password }}"
develop_configuration:
  bw_ssh_private_key_attachment_name: id_ed25519_romira_private_key
  bw_ssh_private_key_item_id: 2c5a6eeb-b1e8-4217-b0b5-4d9d69d3cf76
  ssh_passphrase: "{{ vault_develop_configuration.vault_ssh_passphrase }}"
  directories:
    - ~/.config/fish/
    - ~/.local/bin/
    - ~/workspace/repositories
    - ~/.claude/
    - ~/.codex/
    - ~/.gemini/
    - ~/.config/opencode/
    - ~/.hermes/
    - ~/.config/litellm/
    - ~/.claude-code-router/
  symbolic_links:
    - src: ~/.config/romira-s-config/git/.gitconfig
      dest: ~/.gitconfig
    - src: ~/.config/romira-s-config/shell/.profile
      dest: ~/.profile
    - src: ~/.config/romira-s-config/fish/config.fish
      dest: ~/.config/fish/config.fish
    - src: ~/.config/romira-s-config/zsh/.zshrc
      dest: ~/.zshrc
    - src: ~/.config/romira-s-config/zsh/.zpreztorc
      dest: ~/.zpreztorc
    - src: ~/.config/romira-s-config/vim/.vim
      dest: ~/.vim
    - src: ~/.config/romira-s-config/vim/.vimrc
      dest: ~/.vimrc
    - src: ~/.config/romira-s-config/tmux/.tmux.conf
      dest: ~/.tmux.conf
    - src: ~/.config/romira-s-config/latex/.latexmkrc
      dest: ~/.latexmkrc
    - src: ~/.config/romira-s-config/starship/starship.toml
      dest: ~/.config/starship.toml
    - src: ~/.config/romira-s-config/ai-config/CLAUDE.md
      dest: ~/.claude/CLAUDE.md
    - src: ~/.config/romira-s-config/ai-config/CLAUDE.md
      dest: ~/.codex/AGENTS.md
    - src: ~/.config/romira-s-config/ai-config/codex/config.toml
      dest: ~/.codex/config.toml
    - src: ~/.config/romira-s-config/ai-config/codex/hooks.json
      dest: ~/.codex/hooks.json
    - src: ~/.config/romira-s-config/ai-config/CLAUDE.md
      dest: ~/.gemini/GEMINI.md
    - src: ~/.config/romira-s-config/ai-config/CLAUDE.md
      dest: ~/.config/opencode/AGENTS.md
    - src: ~/.config/romira-s-config/ai-config/CLAUDE.md
      dest: ~/.hermes/SOUL.md
    - src: ~/.config/romira-s-config/ai-config/hermes-agent/config.yaml
      dest: ~/.hermes/config.yaml
    - src: ~/.config/romira-s-config/ai-config/claude-code/settings.json
      dest: ~/.claude/settings.json
    - src: ~/.config/romira-s-config/ai-config/litellm/claude-free
      dest: ~/.local/bin/claude-free
    - src: ~/.config/romira-s-config/ai-config/claude-code-router/claude-copilot
      dest: ~/.local/bin/claude-copilot
    - src: ~/.config/romira-s-config/ai-config/litellm/config.yaml
      dest: ~/.config/litellm/config.yaml
    - src: ~/.config/romira-s-config/ai-config/claude-code-router/config.json
      dest: ~/.claude-code-router/config.json
    - src: ~/.config/romira-s-config/ai-config/opencode/tui.json
      dest: ~/.config/opencode/tui.json
    - src: ~/.config/romira-s-config/ai-config/opencode/opencode.json
      dest: ~/.config/opencode/opencode.json
    - src: ~/.config/romira-s-config/ai-config/opencode/prompts
      dest: ~/.config/opencode/prompts
    - src: ~/.config/romira-s-config/topgrade/topgrade.toml
      dest: ~/.config/topgrade.toml
    - src: ~/.config/romira-s-config/herdr/config.toml
      dest: ~/.config/herdr/config.toml
  wsl_symbolic_links:
    - src: /mnt/c/Windows/System32/clip.exe
      dest: ~/.local/bin/clip
    - src: /mnt/c/Users/{{ windows_user }}/AppData/Local/Programs/Microsoft VS Code/bin/code
      dest: ~/.local/bin/code
    - src: /mnt/c/Windows/explorer.exe
      dest: ~/.local/bin/explorer
    - src: /mnt/c/Program Files (x86)/Microsoft/Edge/Application/msedge.exe
      dest: ~/.local/bin/msedge
    - src: ~/.local/share/JetBrains/Toolbox/apps/rustrover/bin/rustrover
      dest: ~/.local/bin/rustrover
    - src: /mnt/c/Users/{{ windows_user }}/AppData/Local/Programs/Obsidian/Obsidian.exe
      dest: ~/.local/bin/obsidian
    - src: /mnt/c/Users/{{ windows_user }}/AppData/Local/Programs/Zed/bin/zed
      dest: ~/.local/bin/zed
gh:
  github_fine_grained_token: "{{ vault_gh.vault_github_fine_grained_token }}"
  repository:
    - repo: Romira915/ssh-config
      dest: ~/.tmp/.ssh
    - repo: Romira915/romira-s-config
      dest: ~/.config/romira-s-config
user:
  groups: []
  absent_groups: []
  users:
    - name: romira
      groups:
        - sudo
      password: "{{ vault_user.vault_romira.vault_password }}"
      password_salt: "{{ vault_user.vault_romira.vault_password_salt }}"
      authorized_keys: https://github.com/Romira915.keys
  absent_users: []
additional_path: /home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/home/romira/.cargo/bin
ai_skills:
  src: ~/.config/romira-s-config/ai-config/skills
  destinations:
    - ~/.claude/skills
    - ~/.codex/skills
    - ~/.gemini/skills
    - ~/.config/opencode/skills
    - ~/.hermes/skills
ai_rules:
  src: ~/.config/romira-s-config/ai-config/rules
  destinations:
    - ~/.claude/rules
    - ~/.codex/rules
    - ~/.gemini/rules
    - ~/.config/opencode/rules
opencode_env_files:
  - dest: ~/.config/opencode/env/google-oauth-client-id
    content: "{{ vault_opencode_env.google_oauth_client_id }}"
  - dest: ~/.config/opencode/env/google-oauth-client-secret
    content: "{{ vault_opencode_env.google_oauth_client_secret }}"
  - dest: ~/.config/opencode/env/user-google-email
    content: "{{ vault_opencode_env.user_google_email }}"
brew_extra_packages:
  - xsel
