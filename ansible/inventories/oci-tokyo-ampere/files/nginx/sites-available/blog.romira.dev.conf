server {
    server_name blog.romira.dev; # managed by Certbot    

    proxy_set_header    X-Real-IP               $remote_addr;
    proxy_set_header    X-Forwarded-Host        $host;
    proxy_set_header    X-Forwarded-For         $proxy_add_x_forwarded_for;

    client_max_body_size 1000g;

    location = /.well-known {
        root /var/www/blog/;
    }

    location /preview {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/password/.blog-romira-dev;
        proxy_pass http://127.0.0.1:3000;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;

	proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header X-Cache-Status $upstream_cache_status;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/blog.romira.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/blog.romira.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
