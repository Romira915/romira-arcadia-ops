map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    server_name opencode.romira.dev;

    proxy_buffering off;
    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:4181;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/opencode.romira.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/opencode.romira.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = opencode.romira.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name opencode.romira.dev;
    return 404; # managed by Certbot


}
