server {
    server_name librechat.romira.dev; # managed by Certbot    

    proxy_set_header    X-Real-IP               $remote_addr;
    proxy_set_header    X-Forwarded-Host        $host;
    proxy_set_header    X-Forwarded-For         $proxy_add_x_forwarded_for;

    client_max_body_size 1000g;

    location = /.well-known {
        root /var/www/html/;
    }

    location / {
        proxy_pass http://127.0.0.1:3080;

	proxy_cache cache_key;
	proxy_cache_revalidate on;
	proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;

        add_header X-Cache-Status $upstream_cache_status;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/librechat.romira.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/librechat.romira.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = librechat.romira.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name librechat.romira.dev;

    listen 80;
    return 404; # managed by Certbot


}
