map $http_upgrade $connection_upgrade { 
    default upgrade;
    ''      close;
} 

server {
    server_name vaultwarden.romira.dev; # managed by Certbot    
    location /.well-known/ {
	root /usr/local/vaultwarden/html;
    }

    proxy_http_version  1.1;
    proxy_set_header    X-Real-IP               $remote_addr;
    proxy_set_header    X-Forwarded-Host        $host;
    proxy_set_header    X-Forwarded-For         $proxy_add_x_forwarded_for;
    proxy_set_header    Upgrade $http_upgrade;
    proxy_set_header    Connection $connection_upgrade;

    client_max_body_size 1000g;

    location / {
        proxy_pass    http://127.0.0.1:10080;

	proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header X-Cache-Status $upstream_cache_status;
    }

    listen 443 ssl; # managed by Certbot

    ssl_certificate /etc/letsencrypt/live/vaultwarden.romira.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/vaultwarden.romira.dev/privkey.pem; # managed by Certbot
}
server {
    server_name vaultwarden.romira.dev;

    if ($host = vaultwarden.romira.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    location /.well-known/ {
        alias /usr/local/vaultwarden/html/;
    }

    listen 80;
}
