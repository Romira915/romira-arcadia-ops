---
# tasks file for roles/postgresql
- name: Install PostgreSQL
  ansible.builtin.apt:
    name:
      - postgresql
      - python3-psycopg2
    state: present
  become: true
  register: postgresql_install
  tags:
    - postgresql
    - apt

- name: Reset connection after installing psycopg2
  ansible.builtin.meta: reset_connection

- name: Check psycopg2 availability
  ansible.builtin.command: python3 -c "import psycopg2"
  register: postgresql_psycopg2_check
  changed_when: false
  failed_when: false
  check_mode: false
  tags:
    - postgresql

- name: Ensure PostgreSQL is started and enabled
  ansible.builtin.systemd:
    name: postgresql
    state: started
    enabled: true
  become: true
  tags:
    - postgresql

- name: Ensure that database users exist
  community.postgresql.postgresql_user:
    name: "{{ item.name }}"
    password: "{{ item.password | default(omit) }}"
    no_password_changes: "{{ item.password is not defined }}"
    state: present
  become: true
  become_user: postgres
  loop: "{{ postgresql.users }}"
  no_log: true
  when: not ansible_check_mode or postgresql_psycopg2_check.rc == 0
  tags:
    - postgresql

- name: Ensure that databases exist
  community.postgresql.postgresql_db:
    name: "{{ item.name }}"
    owner: "{{ item.owner | default(omit) }}"
    state: present
  become: true
  become_user: postgres
  loop: "{{ postgresql.databases }}"
  when: not ansible_check_mode or postgresql_psycopg2_check.rc == 0
  tags:
    - postgresql

- name: Grant database privileges to users
  community.postgresql.postgresql_privs:
    db: "{{ item.db }}"
    role: "{{ item.name }}"
    type: database
    privs: ALL
    state: present
  become: true
  become_user: postgres
  loop: "{{ postgresql.users }}"
  when:
    - item.db is defined
    - not ansible_check_mode or postgresql_psycopg2_check.rc == 0
  no_log: true
  tags:
    - postgresql
