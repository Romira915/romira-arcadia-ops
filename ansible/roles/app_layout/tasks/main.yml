---
- name: Ensure app root directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode | default('0755') }}"
  become: true
  loop: "{{ app_layouts }}"
  loop_control:
    label: "{{ item.name }}:{{ item.path }}"
  tags:
    - app-layout
    - configuration

- name: Ensure app subdirectories exist
  ansible.builtin.file:
    path: "{{ item.0.path }}/{{ item.1.path }}"
    state: directory
    owner: "{{ item.1.owner | default(item.0.owner | default('root')) }}"
    group: "{{ item.1.group | default(item.0.group | default('root')) }}"
    mode: "{{ item.1.mode | default('0755') }}"
  become: true
  loop: "{{ app_layouts | subelements('directories', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}:{{ item.1.path }}"
  tags:
    - app-layout
    - configuration

- name: Copy managed app required files
  ansible.builtin.copy:
    src: "{{ app_layout_src_dir }}/{{ item.1.src | default(item.0.name ~ '/' ~ item.1.path) }}"
    dest: "{{ item.0.path }}/{{ item.1.path }}"
    owner: "{{ item.1.owner | default(item.0.owner | default('root')) }}"
    group: "{{ item.1.group | default(item.0.group | default('root')) }}"
    mode: "{{ item.1.mode | default('0644') }}"
  become: true
  loop: "{{ app_layouts | subelements('required_files', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}:{{ item.1.path }}"
  when:
    - item.1.managed | default(false) | bool
    - not (item.1.src | default(item.0.name ~ '/' ~ item.1.path)).endswith('.j2')
  tags:
    - app-layout
    - configuration

- name: Template managed app required files (.j2)
  ansible.builtin.template:
    src: "{{ app_layout_src_dir }}/{{ item.1.src | default(item.0.name ~ '/' ~ item.1.path) }}"
    dest: "{{ item.0.path }}/{{ item.1.path }}"
    owner: "{{ item.1.owner | default(item.0.owner | default('root')) }}"
    group: "{{ item.1.group | default(item.0.group | default('root')) }}"
    mode: "{{ item.1.mode | default('0644') }}"
  become: true
  loop: "{{ app_layouts | subelements('required_files', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}:{{ item.1.path }}"
  when:
    - item.1.managed | default(false) | bool
    - (item.1.src | default(item.0.name ~ '/' ~ item.1.path)).endswith('.j2')
  tags:
    - app-layout
    - configuration

- name: Stat app required files
  ansible.builtin.stat:
    path: "{{ item.0.path }}/{{ item.1.path }}"
    get_checksum: false
  become: true
  register: app_layout_required_files
  loop: "{{ app_layouts | subelements('required_files', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}:{{ item.1.path }}"
  tags:
    - app-layout
    - configuration

- name: Assert app required files exist
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: "Required file is missing: {{ item.item.0.path }}/{{ item.item.1.path }}"
    success_msg: "Required file exists: {{ item.item.0.path }}/{{ item.item.1.path }}"
    quiet: true
  loop: "{{ app_layout_required_files.results | default([]) }}"
  loop_control:
    label: "{{ item.item.0.name }}:{{ item.item.1.path }}"
  when: app_layout_enforce_required_files | bool
  tags:
    - app-layout
    - configuration
